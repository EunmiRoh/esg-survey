<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG AI 컨설팅 전문가 평가 설문</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#002555;--navy-d:#001A3D;--navy-l:#E8EDF5;--navy-ll:#F4F7FB;
  --accent:#3F8CAA;--accent-l:#EBF4F8;
  --white:#fff;--off:#F5F7FA;
  --g1:#1C2340;--g2:#4A5270;--g3:#8890A8;
  --border:#DDE2EE;
  --auto:#00A050;--auto-l:#E6F9EF;
  --cond:#E07B00;--cond-l:#FFF4E5;
  --hitl:#C0392B;--hitl-l:#FDECEB;
  --font:"Noto Sans KR",sans-serif;--mono:"JetBrains Mono",monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--off);color:var(--g1);line-height:1.6;min-height:100vh;}
.wrap{max-width:880px;margin:0 auto;padding:32px 20px 80px;}

/* 상단 바 */
.topbar{background:var(--navy);color:#fff;padding:18px 24px;border-radius:8px 8px 0 0;}
.topbar-logo{font-size:10px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:4px;}
.topbar-title{font-size:18px;font-weight:900;line-height:1.3;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;}

/* 카드 */
.card{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:28px;}

/* 상태 카드 (에러용) */
.state{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:48px 32px;text-align:center;margin-top:24px;}
.state-icon{font-size:48px;margin-bottom:16px;}
.state-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.state-desc{font-size:13px;color:var(--g2);max-width:480px;margin:0 auto;}
.state.err .state-icon{color:var(--hitl);}
.state.warn .state-icon{color:var(--cond);}
.state.done .state-icon{color:var(--auto);}

/* 회사 정보 박스 */
.section-title{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--navy-l);}
.section-title:not(:first-child){margin-top:32px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px 24px;margin-bottom:8px;}
.info-row{display:flex;flex-direction:column;}
.info-label{font-size:11px;color:var(--g3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.info-value{font-size:14px;color:var(--g1);font-weight:600;margin-top:2px;}
.info-value .badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono);}
.badge.a{background:#EBF5EE;color:#1B7A3D;}
.badge.b{background:var(--accent-l);color:var(--accent);}
.badge.c{background:var(--cond-l);color:var(--cond);}
.badge.d{background:var(--hitl-l);color:var(--hitl);}

/* 보고서 다운로드 */
.report-list{display:flex;flex-direction:column;gap:8px;}
.report-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--navy-ll);border:1px solid var(--border);border-radius:6px;text-decoration:none;color:var(--g1);transition:all .15s;}
.report-item:hover{background:var(--navy-l);border-color:var(--accent);}
.report-icon{font-size:22px;}
.report-name{flex:1;font-size:13px;font-weight:600;}
.report-hint{font-size:11px;color:var(--g3);}
.report-empty{padding:16px;background:var(--cond-l);color:var(--cond);border-radius:6px;font-size:12px;text-align:center;}

/* 안내 박스 */
.notice{background:var(--accent-l);border-left:3px solid var(--accent);padding:14px 16px;border-radius:4px;font-size:12px;color:var(--g2);margin-bottom:16px;line-height:1.7;}
.notice strong{color:var(--navy);}

/* 폼 placeholder (Day 2에 채울 곳) */
.form-placeholder{background:var(--off);border:2px dashed var(--border);border-radius:8px;padding:48px 24px;text-align:center;color:var(--g3);font-size:13px;}

/* 로딩 */
.loading{text-align:center;padding:64px 24px;color:var(--g3);font-size:13px;}
.loading::before{content:'';display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 푸터 */
.foot{text-align:center;font-size:11px;color:var(--g3);margin-top:32px;line-height:1.7;}

@media(max-width:640px){
  .wrap{padding:16px 12px 40px;}
  .card{padding:20px;}
  .state{padding:32px 20px;}
  .info-grid{grid-template-columns:1fr;}
}

/* ============ 설문 폼 ============ */

/* 진행률 바 */
.progress-wrap{margin:24px 0 32px;}
.progress-label{font-size:11px;font-weight:600;color:var(--g2);margin-bottom:6px;}
.progress-label span{color:var(--accent);font-weight:700;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .3s ease;}

/* 섹션 제목 (재정의) */
.section-title{font-size:14px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;margin:36px 0 16px;padding:10px 14px;background:var(--navy-l);border-left:4px solid var(--navy);border-radius:0 4px 4px 0;}
.section-title:first-child{margin-top:8px;}
.section-hint{font-size:11px;font-weight:500;color:var(--g3);text-transform:none;letter-spacing:0;margin-left:8px;}

/* 폼 그룹 */
.form-group{margin-bottom:24px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--g1);margin-bottom:10px;line-height:1.5;}
.form-label.required::after{content:'*';color:var(--hitl);margin-left:4px;}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;color:var(--g1);background:#fff;}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}
.form-textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;color:var(--g1);background:#fff;resize:vertical;line-height:1.6;}
.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}

/* 라디오 그룹 */
.radio-group{display:flex;flex-wrap:wrap;gap:8px;}
.radio-group.radio-vertical{flex-direction:column;gap:6px;}
.radio{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--g1);background:#fff;transition:all .15s;user-select:none;}
.radio:hover{border-color:var(--accent);background:var(--accent-l);}
.radio input[type="radio"]{margin:0;cursor:pointer;}
.radio input[type="radio"]:checked + span{color:var(--navy);font-weight:700;}
.radio:has(input:checked){border-color:var(--navy);background:var(--navy-l);}

/* 차원 카드 */
.dim-card{background:var(--navy-ll);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px;}
.dim-title{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dim-tag{display:inline-block;padding:2px 8px;font-size:10px;font-family:var(--mono);background:var(--accent);color:#fff;border-radius:3px;letter-spacing:.5px;}
.dim-desc{font-size:12px;color:var(--g2);line-height:1.7;margin-bottom:14px;}
.dim-desc details{margin-top:8px;}
.dim-desc summary{cursor:pointer;color:var(--accent);font-weight:600;font-size:11px;user-select:none;}
.dim-desc summary:hover{text-decoration:underline;}
.dim-criteria{margin-top:8px;padding:10px 12px;background:#fff;border-radius:4px;font-size:11px;line-height:1.7;}
.dim-criteria > div{margin-bottom:4px;}

/* 리커트 5점 */
.likert{display:flex;gap:6px;justify-content:center;background:#fff;padding:12px;border-radius:6px;}
.likert label{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;font-size:11px;}
.likert label:hover{border-color:var(--accent);background:var(--accent-l);}
.likert label span{font-size:18px;font-weight:800;color:var(--g3);font-family:var(--mono);}
.likert label:has(input:checked){border-color:var(--navy);background:var(--navy);color:#fff;}
.likert label:has(input:checked) span{color:#fff;}
.likert input[type="radio"]{position:absolute;opacity:0;width:0;height:0;}

/* 알림 박스 (작은) */
.notice-sm{font-size:11px;padding:10px 12px;margin-bottom:16px;}

/* 제출 */
.submit-wrap{margin-top:40px;padding-top:24px;border-top:2px solid var(--border);text-align:center;}
.btn-submit{padding:14px 48px;font-size:14px;font-weight:800;color:#fff;background:var(--navy);border:none;border-radius:8px;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.btn-submit:hover:not(:disabled){background:var(--navy-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,37,85,.2);}
.btn-submit:disabled{background:var(--g3);cursor:not-allowed;}
.submit-hint{font-size:11px;color:var(--g3);margin-top:10px;}

/* ============ 평가 안내 섹션 ============ */
.guide-section{
  background:#fff;
  border:2px solid var(--navy);
  border-radius:12px;
  padding:32px 28px;
  margin:32px 0;
  box-shadow:0 4px 16px rgba(0,37,85,.08);
}
.guide-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding-bottom:18px;
  margin-bottom:20px;
  border-bottom:2px solid var(--navy);
}
.guide-icon{font-size:28px;line-height:1;}
.guide-title{
  font-size:22px;
  font-weight:800;
  color:var(--navy);
  margin:0;
  letter-spacing:.5px;
}
.guide-intro{
  font-size:14px;
  line-height:1.7;
  color:var(--g1);
  margin:0 0 24px;
  padding:14px 18px;
  background:var(--navy-l);
  border-radius:8px;
  border-left:4px solid var(--accent);
}

.guide-block{margin-bottom:28px;}
.guide-block:last-of-type{margin-bottom:0;}
.guide-block-title{
  font-size:15px;
  font-weight:800;
  color:var(--navy);
  margin:0 0 12px;
  padding-bottom:8px;
  border-bottom:1px dashed var(--border);
}
.guide-block-body{
  font-size:13px;
  line-height:1.8;
  color:var(--g1);
  margin:0 0 8px;
}
.guide-block-foot{
  margin-top:14px;
  padding:10px 14px;
  background:var(--accent-l);
  border-radius:6px;
  font-size:12px;
  color:var(--g2);
}
.guide-researcher{
  margin-top:10px;
  font-size:12px;
  color:var(--g2);
  font-style:italic;
}
.guide-list{
  margin:8px 0 0;
  padding:0 0 0 20px;
  font-size:13px;
  line-height:1.9;
  color:var(--g1);
}
.guide-list li{margin-bottom:4px;}

/* 평가 대상 / 참고 자료 블록 */
.guide-target{
  margin-top:14px;
  padding:16px 18px;
  border-radius:8px;
  border:1.5px solid;
}
.guide-target-include{
  background:var(--navy-l);
  border-color:var(--navy);
}
.guide-target-exclude{
  background:#f5f5f5;
  border-color:#ccc;
  opacity:.92;
}
.guide-target-label{
  font-size:13px;
  font-weight:800;
  color:var(--navy);
  margin-bottom:10px;
  letter-spacing:.3px;
}
.guide-target-exclude .guide-target-label{color:var(--g2);}
.guide-target-list{
  margin:0;
  padding:0 0 0 18px;
  font-size:13px;
  line-height:1.7;
  color:var(--g1);
}
.guide-target-list li{margin-bottom:8px;}
.guide-target-list li:last-child{margin-bottom:0;}
.guide-target-detail{
  display:inline-block;
  margin-top:4px;
  font-size:12px;
  color:var(--g2);
  line-height:1.7;
}
.guide-target-arrow{
  margin:14px 0 0;
  padding:10px 14px;
  background:#fff;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
  color:var(--navy);
  line-height:1.7;
}

/* EIEC 5차원 박스 */
.guide-eiec{
  margin:14px 0;
  padding:18px;
  background:linear-gradient(135deg, var(--navy-l), #fff);
  border-radius:8px;
  border:1px solid var(--border);
}
.guide-eiec-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:14px;
  margin-bottom:8px;
}
.guide-eiec-row:first-child{margin-top:0;}
.guide-eiec-tag{
  display:inline-block;
  padding:4px 12px;
  background:var(--navy);
  color:#fff;
  font-family:var(--mono);
  font-size:12px;
  font-weight:800;
  border-radius:4px;
  letter-spacing:1px;
  min-width:54px;
  text-align:center;
}
.guide-eiec-meaning{
  font-size:13px;
  color:var(--g1);
  font-weight:600;
}
.guide-eiec-dims{
  margin-left:66px;
  margin-bottom:8px;
}
.guide-eiec-dim{
  font-size:13px;
  line-height:1.8;
  color:var(--g1);
  padding:4px 0;
}

/* 동의 체크박스 */
.guide-consent{
  margin-top:32px;
  padding:20px 22px;
  background:var(--accent-l);
  border:2px solid var(--accent);
  border-radius:10px;
  text-align:center;
}
.guide-consent-label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  cursor:pointer;
  user-select:none;
}
.guide-consent-label input[type="checkbox"]{
  width:20px;
  height:20px;
  cursor:pointer;
  accent-color:var(--navy);
}
.guide-consent-text{
  font-size:14px;
  font-weight:700;
  color:var(--navy);
}
.guide-consent-hint{
  margin:8px 0 0;
  font-size:11px;
  color:var(--g3);
}

/* 설문 폼 비활성화 (체크박스 미체크 시) */
.survey-form-disabled{
  display:none;
}

/* 모바일 */
@media(max-width:640px){
  .guide-section{padding:22px 18px;margin:20px 0;}
  .guide-title{font-size:18px;}
  .guide-block-title{font-size:14px;}
  .guide-block-body, .guide-list{font-size:12.5px;}
  .guide-eiec{padding:14px;}
  .guide-eiec-dims{margin-left:0;margin-top:4px;}
  .guide-eiec-dim{font-size:12.5px;}
  .guide-consent{padding:16px;}
  .guide-consent-text{font-size:13px;}
  .guide-target{padding:12px 14px;}
}

/* 모바일 (설문 폼) */
@media(max-width:640px){
  .radio-group{flex-direction:column;}
  .likert{padding:8px 4px;gap:3px;}
  .likert label{padding:8px 4px;}
  .likert label span{font-size:15px;}
  .dim-card{padding:14px;}
  .submit-wrap{margin-top:24px;}
  .btn-submit{width:100%;padding:14px;}
}
</style>
</head>
<body>

<div class="wrap">

  <!-- 상단 바 (항상 보임) -->
  <div class="topbar">
    <div class="topbar-logo">ESG-AACS · Hansung Univ.</div>
    <div class="topbar-title">ESG AI 컨설팅 전문가 평가 설문</div>
    <div class="topbar-sub">한성대학교 박사학위 연구 · 노은미 · v4.0 5점 리커트</div>
  </div>

  <!-- 메인 영역: JS가 상태에 따라 콘텐츠 교체 -->
  <div id="main">
    <div class="loading">설문 정보를 불러오는 중...</div>
  </div>

  <div class="foot">
    한성대학교 대학원 스마트융합컨설팅학과 · 연구자 노은미 (eunm2roh@gmail.com)<br>
    응답은 익명으로 처리되며, 박사학위 논문 측정도구 검증 목적으로만 사용됩니다.
  </div>

</div>

<script>
// ============================================================
// Supabase 연결 (어드민과 동일한 프로젝트, anon key)
// ============================================================
const SUPABASE_URL = 'https://mwkdtasjkktqqlqefdhr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13a2R0YXNqa2t0cXFscWVmZGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzkxNzQsImV4cCI6MjA4OTQ1NTE3NH0.hdYLzfThbBsFpGnTCvB4CEpm0BX0ZVrd4eMKkn7T_5g';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STORAGE_BUCKET = 'esg-reports';

// ============================================================
// 진입 — URL에서 토큰 추출 후 검증
// ============================================================
let invitation = null;   // survey_invitations 행
let diagnosis = null;    // diagnosis_results 행
let reports = [];        // Storage 버킷에서 찾은 파일 목록

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    return renderState('err', '🚫', '잘못된 접근입니다',
      '이 페이지는 연구자가 발급한 검증 링크를 통해서만 접근할 수 있습니다. 받으신 링크를 다시 확인해주세요.');
  }

  await loadByToken(token);
});

// ============================================================
// 토큰 검증 + 데이터 로드
// ============================================================
async function loadByToken(token) {
  try {
    // 1. survey_invitations에서 토큰 조회
    const { data: invs, error: e1 } = await sb
      .from('survey_invitations')
      .select('*')
      .eq('token', token)
      .limit(1);

    if (e1) throw e1;
    if (!invs || invs.length === 0) {
      return renderState('err', '🚫', '유효하지 않은 링크입니다',
        '이 토큰은 시스템에 등록되어 있지 않습니다. 링크가 정확한지 다시 확인해주시고, 문제가 지속되면 연구자(eunm2roh@gmail.com)에게 문의해주세요.');
    }

    invitation = invs[0];

    // 2. 만료 확인
    if (invitation.expires_at && new Date(invitation.expires_at) < new Date()) {
      return renderState('warn', '⏰', '만료된 링크입니다',
        '이 검증 링크는 만료되었습니다. 연구자(eunm2roh@gmail.com)에게 새 링크 발급을 요청해주세요.');
    }

    // 3. 이미 완료된 응답
    if (invitation.status === 'completed') {
      return renderState('done', '✅', '이미 응답이 완료된 링크입니다',
        '이 링크에 대한 설문 응답은 이미 제출되었습니다. 응답에 진심으로 감사드립니다. 추가 의견이 있으시면 연구자(eunm2roh@gmail.com)에게 직접 연락주시면 됩니다.');
    }

    // 4. diagnosis_results 조회
    const { data: diags, error: e2 } = await sb
      .from('diagnosis_results')
      .select('*')
      .eq('id', invitation.diagnosis_id)
      .limit(1);

    if (e2) throw e2;
    if (!diags || diags.length === 0) {
      return renderState('err', '⚠️', '진단 결과를 찾을 수 없습니다',
        '연결된 진단 결과가 시스템에서 삭제되었거나 접근할 수 없습니다. 연구자에게 문의해주세요.');
    }

    diagnosis = diags[0];

    // 5. Storage에서 보고서 파일 목록 가져오기
    //    파일 경로 규칙: esg-reports/{diagnosis_id}/{filename}
    //    esg-platform이 PDF 2종 자동 업로드, 박사님이 워드 5종 업로드
    await loadReports(diagnosis.id);

    // 6. 정상 화면 렌더링
    renderSurvey();

  } catch (err) {
    console.error('[loadByToken]', err);
    renderState('err', '⚠️', '시스템 오류',
      '데이터를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주시거나 연구자에게 문의해주세요.<br><br><code style="font-size:11px;color:var(--g3)">' + (err.message || err) + '</code>');
  }
}

// ============================================================
// Storage에서 보고서 파일 목록 로드
// ============================================================
async function loadReports(diagnosisId) {
  try {
    const { data: files, error } = await sb
      .storage
      .from(STORAGE_BUCKET)
      .list(diagnosisId, { limit: 50, sortBy: { column: 'name', order: 'asc' } });

    if (error) {
      console.warn('[loadReports] list 실패:', error);
      reports = [];
      return;
    }

    // ⚠️ 폴더 (metadata가 null) 및 숨김 파일 제외
    reports = (files || [])
      .filter(f => f.name && !f.name.startsWith('.') && f.metadata !== null)
      .map(f => {
        const path = `${diagnosisId}/${f.name}`;
        const { data: pub } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        return {
          name: f.name,
          url: pub.publicUrl,
          size: f.metadata?.size || 0,
          type: detectType(f.name),
        };
      });
  } catch (err) {
    console.warn('[loadReports]', err);
    reports = [];
  }
}

function detectType(filename) {
  const lower = filename.toLowerCase();

  // 정확히 일치
  if (lower === 'self-assessment.pdf') return '자가진단 보고서';
  if (lower === 'consulting.pdf') return '컨설팅 보고서';

  // 5종 증빙자료 워드
  if (lower.startsWith('e-01')) return '증빙자료 ① 환경경영방침서';
  if (lower.startsWith('s-01')) return '증빙자료 ② 인권경영 선언문';
  if (lower.startsWith('e-08')) return '증빙자료 ③ 에너지 사용량 집계표';
  if (lower.startsWith('e-09')) return '증빙자료 ④ 온실가스 인벤토리';
  if (lower.startsWith('g-01')) return '증빙자료 ⑤ 윤리강령';

  // 확장자 기반
  if (lower.endsWith('.pdf')) return 'PDF 문서';
  if (lower.endsWith('.docx') || lower.endsWith('.doc')) return 'Word 문서';
  return '문서';
}

function fileIcon(type) {
  if (type === '자가진단 보고서') return '📋';
  if (type === '컨설팅 보고서') return '📝';
  if (type && type.startsWith('증빙자료')) return '📎';
  if (type === 'Word 문서') return '📄';
  if (type === 'PDF 문서') return '📄';
  return '📄';
}

function fileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 진행률 추적
// ============================================================
function updateProgress() {
  const form = document.getElementById('surveyForm');
  if (!form) return;

  // 필수 항목 카운팅: name 속성 기반
  const requiredFields = [
    'expert_field', 'esg_career', 'esg_consulting_count', 'main_target',
    'score_specificity', 'score_feasibility', 'score_industry_fit',
    'score_structure', 'score_traceability',
    'b1_hallucination', 'b2_hitl_required', 'b3_ai_match',
    'c1_quality_level', 'c2_provision_readiness', 'c3_replacement_potential',
    'c4_top_advantage', 'c5_top_concern', 'c6_positioning'
  ];

  let answered = 0;
  for (const fieldName of requiredFields) {
    const checked = form.querySelector(`input[name="${fieldName}"]:checked`);
    if (checked) answered++;
  }

  const total = requiredFields.length;
  const pct = Math.round((answered / total) * 100);

  const fillEl = document.getElementById('progress-fill');
  const pctEl = document.getElementById('progress-pct');
  if (fillEl) fillEl.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct;
}

// 폼 변경 감지 (이벤트 위임)
document.addEventListener('change', (e) => {
  if (e.target.closest('#surveyForm')) {
    updateProgress();
  }
});

// 안내문 동의 체크박스 토글
// ============================================================
function toggleSurveyForm() {
  const checkbox = document.getElementById('guideAgree');
  const form = document.getElementById('surveyForm');
  if (!checkbox || !form) return;

  if (checkbox.checked) {
    form.classList.remove('survey-form-disabled');
    setTimeout(() => {
      const firstSection = form.querySelector('.section-title');
      if (firstSection) {
        firstSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 100);
  } else {
    form.classList.add('survey-form-disabled');
  }
}

  const form = event.target;

      score_feasibility: parseInt(fd.get('score_feasibility'), 10),
      score_industry_fit: parseInt(fd.get('score_industry_fit'), 10),
      score_structure: parseInt(fd.get('score_structure'), 10),
      score_traceability: parseInt(fd.get('score_traceability'), 10),

      // Part 2-B
      b1_hallucination: fd.get('b1_hallucination'),
      b2_hitl_required: fd.get('b2_hitl_required'),
      b3_ai_match: fd.get('b3_ai_match'),

      // Part 2-C
      c1_quality_level: fd.get('c1_quality_level'),
      c2_provision_readiness: fd.get('c2_provision_readiness'),
      c3_replacement_potential: fd.get('c3_replacement_potential'),
      c4_top_advantage: fd.get('c4_top_advantage'),
      c5_top_concern: fd.get('c5_top_concern'),
      c6_positioning: fd.get('c6_positioning'),

      // Part 3
      free_comment: (fd.get('free_comment') || '').trim() || null,

      // 메타
      user_agent: navigator.userAgent.substring(0, 500),
      ip_hash: null,  // 클라이언트에서는 IP 못 보내므로 null. RLS 정책상 무방.
    };

    const { data, error } = await sb.from('survey_responses').insert(payload).select();

    if (error) throw error;

    // 트리거가 자동으로 invitations.status = 'completed' 처리함
    renderState('done', '✅', '설문이 성공적으로 제출되었습니다',
      '응답에 진심으로 감사드립니다. 박사님의 검증 자료로 소중하게 활용됩니다.<br><br>창을 닫으셔도 됩니다.');

  } catch (err) {
    console.error('[submitSurvey]', err);
    btn.disabled = false;
    btn.textContent = '설문 제출하기';
    alert('제출 중 오류가 발생했습니다:\n' + (err.message || err) + '\n\n잠시 후 다시 시도하시거나 연구자에게 문의해주세요.');
  }

  return false;
}
</script>

</html>
